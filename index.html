<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Complaint Tracking System - Submit, track, and manage complaints with unique Ticket IDs and real-time status updates.">
  <title>CTS Portal — Complaint Tracking System</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
</head>
<body>
  <!-- Auth Page -->
  <div id="auth-page" class="auth-container">
    <div class="auth-card">
      <div class="logo-section">
        <div class="logo-icon">📋</div>
        <h2>Complaint Tracking Portal</h2>
        <p>Submit, track, and manage complaints efficiently</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login" onclick="App.renderAuthForm('login')">Sign In</button>
        <button class="auth-tab" data-tab="register" onclick="App.renderAuthForm('register')">Register</button>
      </div>
      <div id="auth-form-container"></div>
    </div>
  </div>

  <!-- App Page -->
  <div id="app-page" class="app-container" style="display:none">
    <!-- Mobile Header -->
    <div class="mobile-header">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="logo-icon">📋</div>
        <span style="font-weight:700;font-size:16px">CTS</span>
      </div>
      <button class="hamburger" onclick="App.toggleSidebar()">☰</button>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="App.toggleSidebar()"></div>

    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">📋</div>
        <h1>CTS Portal</h1>
      </div>
      <div id="sidebar-nav" class="sidebar-nav"></div>
      <div class="nav-divider"></div>
      <button class="nav-item" onclick="App.logout()" style="color:var(--priority-critical)">
        <span class="nav-icon">🚪</span> Logout
      </button>
      <div class="sidebar-user">
        <div class="user-avatar" id="user-initial">U</div>
        <div class="user-info">
          <div class="user-name" id="user-display-name">User</div>
          <div class="user-role" id="user-display-role">user</div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div id="view-dashboard" class="view"></div>
      <div id="view-submit" class="view"></div>
      <div id="view-detail" class="view"></div>
      <div id="view-admin" class="view"></div>
      <div id="view-admin-detail" class="view"></div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/complaints.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
